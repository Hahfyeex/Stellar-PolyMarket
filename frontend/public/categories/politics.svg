<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Capitol dome base -->
  <rect x="14" y="52" width="52" height="18" rx="2" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <!-- Columns -->
  <rect x="20" y="44" width="5" height="26" rx="1" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <rect x="30" y="44" width="5" height="26" rx="1" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <rect x="45" y="44" width="5" height="26" rx="1" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <rect x="55" y="44" width="5" height="26" rx="1" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <!-- Dome -->
  <path d="M20 52 Q40 18 60 52 Z" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <path d="M26 52 Q40 26 54 52 Z" fill="#312e81" stroke="#6366f1" stroke-width="1" opacity="0.7"/>
  <!-- Lantern on top -->
  <rect x="37" y="22" width="6" height="8" rx="1" fill="#4338ca" stroke="#818cf8" stroke-width="1"/>
  <!-- Flag pole -->
  <line x1="40" y1="10" x2="40" y2="22" stroke="#a5b4fc" stroke-width="1.5"/>
  <!-- Flag -->
  <polygon points="40,10 54,14 40,18" fill="#6366f1" opacity="0.9"/>
  <!-- Stars on flag -->
  <circle cx="44" cy="14" r="1" fill="white" opacity="0.8"/>
  <circle cx="48" cy="14" r="1" fill="white" opacity="0.8"/>
</svg>
