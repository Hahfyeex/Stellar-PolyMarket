<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Chart background -->
  <rect x="10" y="10" width="60" height="60" rx="8" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Grid lines -->
  <line x1="10" y1="55" x2="70" y2="55" stroke="#166534" stroke-width="0.5"/>
  <line x1="10" y1="42" x2="70" y2="42" stroke="#166534" stroke-width="0.5"/>
  <line x1="10" y1="29" x2="70" y2="29" stroke="#166534" stroke-width="0.5"/>
  <!-- Candlestick bars -->
  <rect x="18" y="44" width="6" height="14" rx="1" fill="#ef4444"/>
  <line x1="21" y1="40" x2="21" y2="44" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="21" y1="58" x2="21" y2="62" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="30" y="36" width="6" height="12" rx="1" fill="#22c55e"/>
  <line x1="33" y1="30" x2="33" y2="36" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="33" y1="48" x2="33" y2="54" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="42" y="28" width="6" height="16" rx="1" fill="#22c55e"/>
  <line x1="45" y1="22" x2="45" y2="28" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="45" y1="44" x2="45" y2="50" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="54" y="20" width="6" height="18" rx="1" fill="#22c55e"/>
  <line x1="57" y1="15" x2="57" y2="20" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="57" y1="38" x2="57" y2="44" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Trend arrow -->
  <polyline points="18,56 30,44 42,36 57,22" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>
