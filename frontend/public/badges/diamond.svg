<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" aria-label="Diamond badge — 200+ markets, 75%+ accuracy">
  <!-- Shield background (darker, premium) -->
  <path d="M48 6 L82 20 L82 50 C82 68 66 82 48 90 C30 82 14 68 14 50 L14 20 Z" fill="#050f1a" stroke="#38bdf8" stroke-width="2"/>
  <!-- Shield shine -->
  <path d="M48 10 L78 22 L78 50 C78 66 63 79 48 86" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.5"/>
  <!-- Diamond gem shape -->
  <polygon points="48,26 64,40 48,70 32,40" fill="#0c2a3d" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Diamond inner facets -->
  <polygon points="48,26 64,40 48,44" fill="#0e3a56" stroke="#7dd3fc" stroke-width="0.5" opacity="0.8"/>
  <polygon points="48,26 32,40 48,44" fill="#092d45" stroke="#7dd3fc" stroke-width="0.5" opacity="0.8"/>
  <polygon points="64,40 48,44 48,70" fill="#071f30" stroke="#38bdf8" stroke-width="0.5" opacity="0.6"/>
  <polygon points="32,40 48,44 48,70" fill="#062030" stroke="#38bdf8" stroke-width="0.5" opacity="0.6"/>
  <!-- "D" letterform in center -->
  <text x="48" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#b9f2ff" opacity="0.9">D</text>
  <!-- Top sparkle -->
  <path d="M48 8 L49 13 L54 13 L50 16 L51.5 21 L48 18.5 L44.5 21 L46 16 L42 13 L47 13 Z" fill="#38bdf8" opacity="0.9"/>
  <!-- Corner sparkles -->
  <circle cx="20" cy="38" r="1.5" fill="#38bdf8" opacity="0.6"/>
  <circle cx="76" cy="38" r="1.5" fill="#38bdf8" opacity="0.6"/>
  <circle cx="48" cy="84" r="1.5" fill="#38bdf8" opacity="0.5"/>
</svg>
