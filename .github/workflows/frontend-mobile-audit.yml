name: Frontend Mobile Audit
on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-mobile-audit.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-mobile-audit.yml"
jobs:
  mobile-layout-and-lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend dependencies
        run: npm ci --workspace frontend --ignore-scripts
      - name: Install Playwright browser
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      - name: Start frontend server
        working-directory: ./frontend
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/frontend-server.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:3000 > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          cat /tmp/frontend-server.log
          exit 1
      - name: Run mobile viewport regression tests
        working-directory: ./frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:mobile -- --grep "home page has viewport meta"
      - name: Run Lighthouse mobile audit
        working-directory: ./frontend
        run: npm run audit:lighthouse:mobile
